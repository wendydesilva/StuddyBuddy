<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Home</title>
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <style>
        .menu-buttons a {
            margin: 8px 8px 8px 0;
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
        }
    </style>
</head>

<body class="container" style="position: relative;">

<a href="/logout" class="btn btn-default logout-btn">Logout</a>

<h2>Welcome, <span th:text="${user.name}"></span>!</h2>
<hr>

<div class="menu-buttons">
    <a th:href="@{/admin/prizes}" class="btn btn-primary">Prize Management</a>
    <a th:href="@{/admin/notifications}" class="btn btn-warning">Notifications</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Check-In</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .sidebar {
            width: 240px;
            background: #1e293b;
            color: #fff;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px;
        }
        .sidebar h3 { margin-bottom: 5px; }
        .sidebar p {
            font-size: 14px;
            color: #cbd5e1;
            margin: 10px 0;
        }
        .sidebar hr { border: 0.5px solid #475569; margin: 15px 0; }
        .sidebar button {
            margin-top: 20px;
            padding: 8px 12px;
            border: none;
            background: #ef4444;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }
        .sidebar button:hover { background: #dc2626; }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 25px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .top-menu {
            margin-left: 240px;
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 20px;
        }
        .top-menu span, .top-menu a {
            text-decoration: none;
            color: inherit;
            font-weight: 500;
            cursor: pointer;
        }
        .top-menu span:hover { color: #2563eb; }
        .active-nav {
            background: #2563eb !important;
            color: white !important;
            padding: 5px 10px;
            border-radius: 5px;
        }


        h2 {
            color: #1e293b;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="text"],
        textarea,
        input[type="file"] {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 100%;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 120px;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #3b82f6;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2563eb;
        }

        .current-file {
            margin-top: 5px;
        }

        .current-file a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }

        .current-file a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="top-menu">
    <span>Home</span>
    <span>Goal</span>
    <span style="background:#ccc; padding:3px 5px;">Session</span>
    <a th:href="@{/checkins}">
        <span>CheckIn</span>
    </a>

    <a th:href="@{/student/sessions/payment}">
        <span>Payment</span>
    </a>
</div>
<div class="container">
    <h2>Edit Check-In</h2>

    <form th:action="@{/checkins/update/{id}(id=${checkIn.id})}" method="post" enctype="multipart/form-data">
        <label>
            Subject:
            <input type="text" name="subject" th:value="${checkIn.subject}" required>
        </label>

        <label>
            Professor:
            <input type="text" name="professor" th:value="${checkIn.professor}" required>
        </label>

        <label>
            Notes:
            <textarea name="notes" th:text="${checkIn.notes}"></textarea>
        </label>

        <label>
            File:
            <input type="file" name="file">
        </label>

        <div th:if="${checkIn.fileName != null}" class="current-file">
            Current file:
            <a th:href="@{'/checkins/file/' + ${checkIn.id}}" target="_blank" th:text="${checkIn.fileName}"></a>
        </div>

        <button type="submit">Update</button>
    </form>
</div>

</body>
</html>

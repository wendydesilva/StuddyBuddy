<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StudyBuddy - Login</title>
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body class="container" style="max-width: 400px; margin-top: 80px;">

<h2 class="text-center">StudyBuddy</h2>
<hr>

<p class="text-success" th:if="${successMessage}" th:text="${successMessage}"></p>
<p class="text-danger" th:if="${errorMessage}" th:text="${errorMessage}"></p>

<form method="POST" th:action="@{/login}">
    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="form-control" required placeholder="Email">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required placeholder="Password">
    </div>
    <div class="form-group">
        <label>Role</label>
        <select name="role" class="form-control" required>
            <option value="STUDENT">Student</option>
            <option value="COACH">Coach</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Login</button>
</form>

<br>
<p><a th:href="@{/signup}">Don't have an account? Sign Up</a></p>
<p><a th:href="@{/forgot-password}">Forgot your password?</a></p>

</body>
</html>

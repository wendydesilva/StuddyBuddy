<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Session Receipt</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f9;
            margin:0;
            padding:0;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .receipt-card {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .receipt-card h2 {
            text-align: center;
            color: #2563eb;
            margin-bottom: 20px;
        }

        .receipt-item {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            font-size: 15px;
            color: #374151;
        }

        .receipt-item span:first-child {
            font-weight: 500;
        }

        .total {
            border-top: 1px solid #ddd;
            margin-top: 15px;
            padding-top: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #1e293b;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #6b7280;
        }

        .actions {
            margin-top: 20px;
            text-align: center;
        }

        .actions button {
            padding: 10px 15px;
            margin: 5px;
            border:none;
            border-radius: 6px;
            cursor:pointer;
            font-weight: 500;
        }

        .print-btn {
            background: #10b981;
            color: white;
        }

        .print-btn:hover {
            background: #059669;
        }

        .back-btn {
            background: #2563eb;
            color: white;
        }

        .back-btn:hover {
            background: #1d4ed8;
        }
    </style>

</head>
<body>

<div class="container">
    <div class="receipt-card">

        <h2>Payment Receipt</h2>

        <div class="receipt-item">
            <span>Plan Name:</span>
            <span th:text="${receiptPayment.plan.name}">Basic</span>
        </div>

        <div class="receipt-item">
            <span>Student:</span>
            <span th:text="${receiptPayment.student.name}">John Doe</span>
        </div>

        <div class="receipt-item">
            <span>Amount:</span>
            <span th:text="'$' + ${receiptPayment.amount}">$0.00</span>
        </div>

        <div class="receipt-item">
            <span>Date:</span>
            <span th:text="${#temporals.format(receiptPayment.paymentDate, 'dd-MMM-yyyy HH:mm')}">01-Jan-2025</span>
        </div>

        <div class="receipt-item total">
            <span>Total Paid:</span>
            <span th:text="'$' + ${receiptPayment.amount}">$0.00</span>
        </div>

        <div class="actions">
            <button class="print-btn" onclick="window.print()">Print</button>

            <a th:href="@{/student/sessions}">
                <button class="back-btn">Back</button>
            </a>
        </div>

        <div class="footer">
            Thank you for your payment!
        </div>

    </div>
</div>

</body>
</html>

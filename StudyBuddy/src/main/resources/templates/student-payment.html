<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Page</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin:0;
            padding:0;
            background: #f4f6f9;
        }

        .sidebar {
            width: 240px;
            background: #1e293b;
            color: #fff;
            height: 100vh;
            float:left;
            padding: 20px;
        }

        .sidebar h3 {
            margin-bottom: 5px;
        }

        .sidebar p {
            font-size: 14px;
            color: #cbd5e1;
        }

        .sidebar hr {
            border: 0.5px solid #475569;
        }

        .sidebar button {
            margin-top: 20px;
            padding: 8px 12px;
            border:none;
            background: #ef4444;
            color: white;
            border-radius: 5px;
            cursor:pointer;
        }

        .sidebar button:hover {
            background: #dc2626;
        }


        .top-menu {
            margin-left: 240px;
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid #ddd;
        }

        .top-menu span {
            margin-right: 20px;
            cursor:pointer;
            font-weight: 500;
        }

        .top-menu span:hover {
            color: #2563eb;
        }

        .top-menu span[style] {
            background:#2563eb !important;
            color:white;
            padding:5px 10px;
            border-radius:5px;
        }


        .container {
            margin-left: 240px;
            padding: 25px;
        }


        .payment-card {
            background: white;
            padding: 25px;
            width: 350px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        .payment-card h3 {
            color: #1e293b;
        }

        .payment-card h1 {
            color: #2563eb;
            margin: 10px 0;
        }

        .payment-card p {
            margin: 10px 0;
            color: #374151;
        }


        .payment-card button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            border:none;
            border-radius: 6px;
            font-weight: 500;
            cursor:pointer;
        }


        .payment-card form:first-of-type button {
            background: #10b981;
            color: white;
        }

        .payment-card form:first-of-type button:hover {
            background: #059669;
        }


        .payment-card form:last-of-type button {
            background: #ef4444;
            color: white;
        }

        .payment-card form:last-of-type button:hover {
            background: #dc2626;
        }

        .toggle {
            display: inline-block;
            width: 45px;
            height: 22px;
            background: #cbd5e1;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            margin-top: 5px;
        }

        .toggle::after {
            content: '';
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        .toggle.active {
            background: #10b981;
        }

        .toggle.active::after {
            transform: translateX(22px);
        }
    </style>
</head>
<body>



<div class="top-menu">


    <span>Home</span>
    <span>Goal</span>
    <a th:href="@{/student/sessions}">
    <span>Session</span>
    </a>
    <span>CheckIn</span>
    <span style="background:#ccc; padding:3px 5px;">Payment</span>
</div>

<div class="container">
    <h2>Review your payment</h2>
    <div class="payment-card">
        <h3 th:text="${selectedPlan != null ? selectedPlan.name : 'No Plan Selected'}">Plan Name</h3>
        <h1 th:text="${selectedPlan != null ? '$' + selectedPlan.price + '/mo' : '$0.00/mo'}">$0.00/mo</h1>
        <hr>
        <p>Total Interest (9%): <span th:text="${selectedPlan != null ? '$' + (selectedPlan.price*0.09) : '$0.00'}">$0.00</span></p>
        <p>Total of Payments: <span th:text="${selectedPlan != null ? '$' + (selectedPlan.price + selectedPlan.price*0.09) : '$0.00'}">$0.00</span></p>
        <p>Your payment will be due each month starting on or after Jan 1, 0000</p>

        <p>AutoPay (optional)</p>
        <div class="toggle" id="autopayToggle"></div>

        <form th:action="@{/student/sessions/processPayment}" method="post">
            <input type="hidden" name="planId" th:value="${selectedPlan != null ? selectedPlan.id : 0}"/>
            <button type="submit">Process Payment</button>
        </form>
        <form th:action="@{/student/sessions}" method="get">


            <button type="submit">Cancel</button>
        </form>
    </div>
</div>

<script>
    const toggle = document.getElementById('autopayToggle');
    toggle.addEventListener('click', () => toggle.classList.toggle('active'));
</script>

</body>
</html>
